<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Installation successful — Asked &amp; Answered</title>
    <style>
      :root {
        --bg: #0b0d14;
        --surface: #12151f;
        --text: #e8eaf0;
        --muted: #9aa2b2;
        --accent: #4f8cff;
        --success: #5ee4a0;
        --border: #252a3a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        max-width: 480px;
        text-align: center;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 48px 40px;
      }
      .check {
        width: 64px;
        height: 64px;
        margin: 0 auto 24px;
        border-radius: 50%;
        background: rgba(94, 228, 160, 0.12);
        color: var(--success);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
      }
      h1 { margin: 0 0 12px; font-size: 1.8rem; }
      p { color: var(--muted); margin: 0 0 28px; line-height: 1.6; }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="check" aria-hidden="true">✓</div>
      <h1>Asked &amp; Answered is installed</h1>
      <p>
        The bot has been added to your Slack workspace. You can now return to Slack and
        run a questionnaire from the app's Home tab or via DM.
      </p>
      <a href="/">Back to landing page</a>
    </main>
  </body>
</html>
