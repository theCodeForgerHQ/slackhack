# Local dev substrate only — the app itself runs via `npm run dev`.
# pgvector/pgvector:pg16 (NOT postgres:16-alpine — that image lacks the vector extension).
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
    # Host port 5433 (not 5432) so `docker compose up` never collides with a
    # host Postgres already on 5432 — localhost:5432 would resolve to the host
    # service, not this container. DATABASE_URL in .env.example matches.
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U relay']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
