# Relay — DEV app manifest (Socket Mode; no request URLs needed).
# Create at api.slack.com/apps -> "From an app manifest". Then generate an
# app-level token (connections:write) and set SLACK_APP_TOKEN in .env.
display_information:
  name: Relay — Crisis Coordination (dev)
  description: Verified crisis coordination — every need tracked, every promise proven.
  background_color: "#B71C1C"
features:
  bot_user:
    display_name: relay
    always_online: true
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  assistant_view:
    assistant_description: Ask Relay about live relief operations — open needs, drifting promises, verified deliveries.
    suggested_prompts:
      - title: Open critical needs
        message: Any critical needs still open?
      - title: Who is drifting?
        message: Which obligations are past their SLA right now?
      - title: Sitrep
        message: Give me the current situation report.
  slash_commands:
    - command: /relay
      description: sitrep · report · need · volunteer · demo
      usage_hint: "sitrep | report | need | volunteer | demo start flood-1"
      should_escape: false
# Scope/event audit 2026-07-07: reconciled against actual call sites + registered
# handlers. REMOVED app_mentions:read (no app_mention handler), reactions:read +
# reactions:write (no reactions.* call site, no reaction_added handler). KEPT the
# groups:* scopes + message.groups: resolveRoles() lists private_channel via
# conversations.list (groups:read) and app.message() handles private-channel intake
# (groups:history + message.groups) — the intake channel may be private for PII reasons.
oauth_config:
  scopes:
    bot:
      - assistant:write
      - canvases:read
      - canvases:write
      - channels:history
      - channels:read
      - chat:write
      - chat:write.customize
      - commands
      - files:read
      - files:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read
settings:
  event_subscriptions:
    bot_events:
      - app_home_opened
      - assistant_thread_started
      - assistant_thread_context_changed
      - message.channels
      - message.groups
      - message.im
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
