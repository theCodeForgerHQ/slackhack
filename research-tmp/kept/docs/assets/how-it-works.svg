<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1040" width="1600" height="1040">
  <defs>
    <style>.h{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}.m{font-family:'Menlo','SF Mono',monospace;}</style>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#94A3B8"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#DC2626"/></marker>
  </defs>
  <rect width="1600" height="1040" fill="#F8FAFC"/><rect width="1600" height="8" fill="#2563EB"/>

  <text x="80" y="80" class="h" font-size="40" font-weight="700" fill="#0F172A">How Kept's integrations work together</text>
  <text x="80" y="120" class="h" font-size="22" fill="#475569">One promise to Acme, reconciled from every source. No single one is "truth" — and the flag is the tie-breaker.</text>

  <!-- ACT 1 — CAPTURE -->
  <text x="80" y="182" class="m" font-size="15" letter-spacing="2" fill="#0F766E">1 · CAPTURE</text>
  <rect x="80" y="200" width="470" height="96" rx="14" fill="#fff" stroke="#E2E8F0"/>
  <rect x="98" y="222" width="52" height="52" rx="13" fill="#fff" stroke="#E9EDF2"/>
  <svg x="106" y="230" width="36" height="36" viewBox="0 0 122.8 122.8"><path d="M25.8 77.6c0 7.1-5.8 12.9-12.9 12.9S0 84.7 0 77.6s5.8-12.9 12.9-12.9h12.9v12.9zm6.5 0c0-7.1 5.8-12.9 12.9-12.9s12.9 5.8 12.9 12.9v32.3c0 7.1-5.8 12.9-12.9 12.9s-12.9-5.8-12.9-12.9V77.6z" fill="#E01E5A"/><path d="M45.2 25.8c-7.1 0-12.9-5.8-12.9-12.9S38.1 0 45.2 0s12.9 5.8 12.9 12.9v12.9H45.2zm0 6.5c7.1 0 12.9 5.8 12.9 12.9s-5.8 12.9-12.9 12.9H12.9C5.8 58.1 0 52.3 0 45.2s5.8-12.9 12.9-12.9h32.3z" fill="#36C5F0"/><path d="M97 45.2c0-7.1 5.8-12.9 12.9-12.9s12.9 5.8 12.9 12.9-5.8 12.9-12.9 12.9H97V45.2zm-6.5 0c0 7.1-5.8 12.9-12.9 12.9s-12.9-5.8-12.9-12.9V12.9C64.7 5.8 70.5 0 77.6 0s12.9 5.8 12.9 12.9v32.3z" fill="#2EB67D"/><path d="M77.6 97c7.1 0 12.9 5.8 12.9 12.9s-5.8 12.9-12.9 12.9-12.9-5.8-12.9-12.9V97h12.9zm0-6.5c-7.1 0-12.9-5.8-12.9-12.9s5.8-12.9 12.9-12.9h32.3c7.1 0 12.9 5.8 12.9 12.9s-5.8 12.9-12.9 12.9H77.6z" fill="#ECB22E"/></svg>
  <text x="168" y="242" class="h" font-size="17" font-weight="700" fill="#0F172A">Slack · #acme-shared</text>
  <text x="168" y="270" class="h" font-size="15" fill="#475569">“we’ll ship the SSO fix by Friday”</text>
  <line x1="550" y1="248" x2="612" y2="248" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#a)"/>
  <rect x="620" y="200" width="300" height="96" rx="14" fill="#EFF4FF" stroke="#2563EB" stroke-width="2"/>
  <text x="640" y="242" class="h" font-size="18" font-weight="700" fill="#1D4ED8">👤 Gate 1 — Confirm</text>
  <text x="640" y="270" class="h" font-size="14" fill="#475569">a human confirms tracking</text>

  <!-- ACT 2 — PROOF RECONCILES -->
  <text x="80" y="360" class="m" font-size="15" letter-spacing="2" fill="#0F766E">2 · PROOF RECONCILES — no single source is truth</text>

  <!-- Jira ✓ -->
  <rect x="80" y="380" width="330" height="118" rx="14" fill="#fff" stroke="#E2E8F0"/>
  <rect x="98" y="400" width="46" height="46" rx="11" fill="#fff" stroke="#E9EDF2"/>
  <svg x="106" y="408" width="30" height="30" viewBox="0 0 24 24"><path fill="#2684FF" d="M11.571 11.513H0a5.218 5.218 0 0 0 5.232 5.215h2.13v2.057A5.215 5.215 0 0 0 12.575 24V12.518a1.005 1.005 0 0 0-1.005-1.005zm5.723-5.756H5.736a5.215 5.215 0 0 0 5.215 5.214h2.129v2.058a5.218 5.218 0 0 0 5.215 5.214V6.758a1.001 1.001 0 0 0-1.001-1.001zM23.013 0H11.455a5.215 5.215 0 0 0 5.215 5.215h2.129v2.057A5.215 5.215 0 0 0 24 12.483V1.005A1.001 1.001 0 0 0 23.013 0Z"/></svg>
  <text x="158" y="418" class="h" font-size="18" font-weight="700" fill="#0F172A">Jira</text>
  <text x="158" y="440" class="h" font-size="14" fill="#64748B">ticket status</text>
  <text x="98" y="480" class="h" font-size="17" font-weight="700" fill="#15803D">✓ Done</text>

  <!-- GitHub ✓ -->
  <rect x="450" y="380" width="330" height="118" rx="14" fill="#fff" stroke="#E2E8F0"/>
  <rect x="468" y="400" width="46" height="46" rx="11" fill="#181717"/>
  <svg x="476" y="408" width="30" height="30" viewBox="0 0 24 24"><path fill="#fff" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
  <text x="528" y="418" class="h" font-size="18" font-weight="700" fill="#0F172A">GitHub Actions</text>
  <text x="528" y="440" class="h" font-size="14" fill="#64748B">CI conclusion</text>
  <text x="468" y="480" class="h" font-size="17" font-weight="700" fill="#15803D">✓ Passed</text>

  <!-- Deploy ✓ -->
  <rect x="820" y="380" width="330" height="118" rx="14" fill="#fff" stroke="#E2E8F0"/>
  <text x="838" y="434" font-size="34">🚀</text>
  <text x="892" y="418" class="h" font-size="18" font-weight="700" fill="#0F172A">Deploy</text>
  <text x="892" y="440" class="h" font-size="14" fill="#64748B">release pipeline</text>
  <text x="838" y="480" class="h" font-size="17" font-weight="700" fill="#15803D">✓ Prod deploy</text>

  <!-- LaunchDarkly ✗ (the odd one) -->
  <rect x="1190" y="380" width="330" height="118" rx="14" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
  <rect x="1208" y="400" width="46" height="46" rx="11" fill="#fff" stroke="#F0D4D1"/>
  <svg x="1216" y="408" width="30" height="30" viewBox="0 0 24 24"><path fill="#405BFF" d="M12 1q.7 10.3 11 11-10.3.7-11 11-.7-10.3-11-11Q11.3 11.3 12 1Z"/></svg>
  <text x="1268" y="418" class="h" font-size="18" font-weight="700" fill="#0F172A">LaunchDarkly</text>
  <text x="1268" y="440" class="h" font-size="14" fill="#64748B">production flag</text>
  <text x="1208" y="480" class="h" font-size="17" font-weight="700" fill="#DC2626">✗ Flag OFF</text>

  <!-- converge to BLOCK -->
  <path d="M245 498 L245 556 L800 556 L800 596" fill="none" stroke="#94A3B8" stroke-width="2.5"/>
  <path d="M615 498 L615 556" fill="none" stroke="#94A3B8" stroke-width="2.5"/>
  <path d="M985 498 L985 556" fill="none" stroke="#94A3B8" stroke-width="2.5"/>
  <path d="M1355 498 L1355 556 L800 556" fill="none" stroke="#DC2626" stroke-width="3" marker-end="url(#ar)"/>
  <rect x="360" y="596" width="880" height="96" rx="14" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
  <text x="800" y="634" class="h" font-size="21" font-weight="700" fill="#B91C1C" text-anchor="middle">⛔ Kept BLOCKS the close</text>
  <text x="800" y="666" class="h" font-size="16" fill="#7F1D1D" text-anchor="middle">Three signals say “done” — but the flag is OFF, so the feature isn’t actually live for Acme. Verify is refused.</text>

  <!-- ACT 3 — RESOLVE & CLOSE -->
  <text x="80" y="756" class="m" font-size="15" letter-spacing="2" fill="#0F766E">3 · FLIP THE FLAG → SIGN → CLOSE</text>
  <g>
    <!-- flag ON -->
    <rect x="80" y="776" width="250" height="96" rx="14" fill="#fff" stroke="#C7EAD1"/>
    <svg x="98" y="808" width="30" height="30" viewBox="0 0 24 24"><path fill="#405BFF" d="M12 1q.7 10.3 11 11-10.3.7-11 11-.7-10.3-11-11Q11.3 11.3 12 1Z"/></svg>
    <text x="138" y="818" class="h" font-size="16" font-weight="700" fill="#0F172A">LaunchDarkly</text>
    <text x="138" y="842" class="h" font-size="15" font-weight="700" fill="#15803D">✓ Flag ON</text>
    <line x1="330" y1="824" x2="392" y2="824" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#a)"/>
    <!-- Gate 2 -->
    <rect x="400" y="776" width="230" height="96" rx="14" fill="#EFF4FF" stroke="#2563EB" stroke-width="2"/>
    <text x="418" y="820" class="h" font-size="17" font-weight="700" fill="#1D4ED8">👤 Gate 2</text>
    <text x="418" y="846" class="h" font-size="14" fill="#475569">a human verifies</text>
    <line x1="630" y1="824" x2="692" y2="824" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#a)"/>
    <!-- sanitized closure -->
    <rect x="700" y="776" width="340" height="96" rx="14" fill="#fff" stroke="#E2E8F0"/>
    <text x="718" y="810" class="h" font-size="16" font-weight="700" fill="#0F172A">🛡️ Sanitized closure</text>
    <text x="718" y="834" class="h" font-size="14" fill="#64748B">posted in the Acme thread —</text>
    <text x="718" y="854" class="h" font-size="14" fill="#64748B">no ticket, PR, or flag shown</text>
    <line x1="1040" y1="824" x2="1102" y2="824" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#a)"/>
    <!-- customer confirms -->
    <rect x="1110" y="776" width="410" height="96" rx="14" fill="#E6F4F1" stroke="#BFE3DB"/>
    <text x="1128" y="810" class="h" font-size="16" font-weight="700" fill="#0B5346">Customer: “works now” ✓</text>
    <text x="1128" y="838" class="h" font-size="15" fill="#0F766E">→ loop CLOSED · owner notified · ✅ Kept</text>
  </g>

  <text x="80" y="960" class="m" font-size="15" fill="#94A3B8">Every source optional except Slack · connect what you have · zero integrations → a human attests (“Mark delivered”)</text>
  <text x="80" y="988" class="m" font-size="15" fill="#94A3B8">kept-iota.vercel.app</text>
</svg>
