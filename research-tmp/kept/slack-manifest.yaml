# Slack app manifest for Kept — paste at api.slack.com/apps → Create New App → From a manifest.
# Configures exactly what the code uses (src/server/slackApp.ts): message + app_home events,
# interactivity (confirm/verify/closure cards + edit modals + view_submission), the /kept
# command, the App Home ledger, and OAuth HTTP mode (the Marketplace deploy shape, W2).
#
# W2 / invariant #6 (Marketplace): production runs HTTP mode (Socket Mode OFF) with
# multi-workspace OAuth. URLs below point at the live deploy: https://kept-slack-agent.fly.dev
# Bolt serves events, actions AND commands at ONE url: /slack/events; the install page is
# /slack/install and the OAuth callback is /slack/oauth_redirect.
#
# LOCAL DEV over Socket Mode instead: set socket_mode_enabled: true, generate an App-Level
# Token with `connections:write` (SLACK_APP_TOKEN), and leave SLACK_CLIENT_ID unset so the
# app boots the single-token path.
display_information:
  name: Kept
  description: Verify customer promises before you say they're done — Kept gathers proof and requires a human sign-off.
  background_color: "#0B1220"
  long_description: >-
    Kept is the verification layer for the promises your team makes to customers in Slack. When
    someone says "we'll ship the SSO fix by Friday" in a shared channel, Kept captures it as a
    tracked commitment, then gathers proof from the systems that actually ship the work — Jira,
    GitHub Actions, LaunchDarkly, Statuspage and more — before anyone tells the customer it's
    done. If the ticket says Done but the feature flag is still off in production, Kept blocks the
    close and shows why. Every closure is signed by a human, and Kept stores only derived facts —
    never your raw Slack message bodies. Built for shared customer channels, with per-workspace
    tenant isolation.
# NOTE: the app ICON is NOT set here — Slack has no manifest field for it. Upload it manually at
# api.slack.com/apps -> your app -> Basic Information -> Display Information -> App icon
# (512x512 PNG). Source logo: docs/assets/kept-icon.svg (export to a 512x512 PNG first).

features:
  bot_user:
    display_name: Kept
    always_online: true
  app_home:
    home_tab_enabled: true
    # Messages tab must be ON (read-write) for the AI Assistant pane.
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  # AI Assistant pane — conversational ledger queries ("Slack AI capabilities").
  assistant_view:
    assistant_description: "Ask the obligation ledger: what's overdue, what we owe a customer, or what's waiting on you to verify."
    suggested_prompts:
      - title: "What's overdue?"
        message: "What's overdue?"
      - title: "What's slipping?"
        message: "What's slipping?"
      - title: "What did we promise Acme?"
        message: "What did we promise Acme this week?"
      - title: "Waiting on me to verify?"
        message: "Anything waiting on me to verify?"
  slash_commands:
    - command: /kept
      description: Show the obligation ledger for a customer
      usage_hint: "[customer]"
      should_escape: false
      url: https://kept-slack-agent.fly.dev/slack/events # HTTP mode: Slack POSTs /kept here

oauth_config:
  # W2 — OAuth callback for multi-workspace install (Bolt's default redirect path).
  redirect_urls:
    - https://kept-slack-agent.fly.dev/slack/oauth_redirect
  scopes:
    bot:
      - chat:write # post confirm/verify/closure cards, owner DMs, in-thread closure
      - im:write # open a DM with the owner for private cards (conversations.open)
      - mpim:write # conversations.open({users}) requires mpim:write under granular scopes (im:write alone is insufficient for that call)
      - im:history # read the user's messages in the AI Assistant thread
      - assistant:write # the AI Assistant pane: setStatus / setSuggestedPrompts / say
      - commands # the /kept slash command
      - channels:history # read messages in public channels Kept is in
      - groups:history # read messages in private / Slack Connect shared channels Kept is in
      - channels:read # channel metadata
      - groups:read # private/shared channel metadata
      # W3 — Real-Time Search (assistant.search.context): bot-token message search needs the granular
      # search:read.public (only bot-allowed message-search scope; blanket `search:read` stays BANNED).
      - search:read.public
    # NOTE: the legacy classic search.messages path needed the BANNED blanket user `search:read`;
    # it is superseded by the (currently disabled) bot-token RTS retriever and not requested.

settings:
  event_subscriptions:
    # W2 — HTTP mode: Slack POSTs events here (Bolt serves events/actions/commands at /slack/events).
    request_url: https://kept-slack-agent.fly.dev/slack/events
    bot_events:
      - message.channels # new message in a public channel → detect an obligation
      - message.groups # new message in a private / Slack Connect shared channel
      - message.im # user messages in the AI Assistant thread
      - app_home_opened # publish the App Home obligation-ledger dashboard
      - assistant_thread_started # AI Assistant pane opened → greet + suggested prompts
      - assistant_thread_context_changed # AI Assistant thread context updates
      # Invariant #4 — data deletion on uninstall: purge the stored bot token AND the
      # tenant's ledger + derived rows. Neither event requires a scope (Slack delivers
      # them to the app that was uninstalled / whose tokens were revoked).
      - app_uninstalled # workspace removed the app → deleteInstallation + purgeTeam
      - tokens_revoked # bot token revoked → treated as an effective uninstall
  interactivity:
    is_enabled: true # buttons, modals, and view_submission (edit-and-confirm / edit-the-reply)
    request_url: https://kept-slack-agent.fly.dev/slack/events # same single endpoint as events
  socket_mode_enabled: false # W2 / invariant #6 — Marketplace runs HTTP mode
  org_deploy_enabled: false # workspace-level installs only
  token_rotation_enabled: false
