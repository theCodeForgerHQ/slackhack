services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cornercheck
      POSTGRES_PASSWORD: cornercheck
      POSTGRES_DB: cornercheck
    ports:
      - "5433:5432"  # host 5433: many dev Macs run a system Postgres on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cornercheck"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
