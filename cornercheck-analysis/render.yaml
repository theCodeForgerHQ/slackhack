# Render blueprint (documents the deployed infra; provisioning is also done via the
# Render MCP). A paid web service keeps the Socket Mode connection alive through judging;
# a paid Postgres has no 30-day expiry. Secrets are set in the dashboard (sync: false).
services:
  - type: web
    name: cornercheck
    runtime: python
    plan: starter # no sleep; the agent must stay connected Jul 14 - Aug 6
    region: oregon
    branch: main
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run python -m cornercheck.app.main
    healthCheckPath: /healthz
    envVars:
      - key: CORNERCHECK_MODEL
        value: claude-opus-4-8
      - key: CORNERCHECK_MODEL_FALLBACK
        value: claude-sonnet-4-6
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORNERCHECK_LEDGER_HMAC_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cornercheck-db
          property: connectionString

databases:
  - name: cornercheck-db
    plan: basic_256mb # no expiry; the seed is small (~4k fighters + 54 cases)
    region: oregon
    postgresMajorVersion: "16"
