<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  html, body { width: 1920px; height: 1080px; margin: 0; overflow: hidden; }
  body {
    background: radial-gradient(1200px 700px at 50% 36%, #15233d 0%, #0b1220 60%);
    color: #e6edf3;
    font: 400 28px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
  }
  h1 { font-size: 120px; font-weight: 800; margin: 0 0 14px; letter-spacing: -0.02em; }
  .badge {
    display: inline-flex; align-items: center; gap: 12px; background: #10391f; color: #3fb950;
    font-weight: 700; font-size: 28px; padding: 10px 22px; border-radius: 999px; margin-bottom: 46px;
  }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: #3fb950; }
  .url { font-size: 64px; font-weight: 700; color: #7ee2b8; margin-bottom: 18px; }
  .repo { font-size: 34px; color: #58a6ff; margin-bottom: 54px; }
  .tag { font-size: 34px; color: #cdd9e5; max-width: 1100px; }
  .foot {
    position: absolute; bottom: 64px; color: #7d8aa0; font-size: 26px; letter-spacing: 0.04em;
  }
  .foot b { color: #9fb3c8; font-weight: 600; }
</style></head>
<body>
  <h1>CornerCheck</h1>
  <div class="badge"><span class="dot"></span> LIVE</div>
  <div class="url">cornercheck.onrender.com</div>
  <div class="repo">github.com/StephenSook/cornercheck</div>
  <div class="tag">Decision support. A human always makes the final call.</div>
  <div class="foot">Slack Agent Builder Challenge &nbsp;·&nbsp; <b>Agent for Good</b></div>
</body></html>
