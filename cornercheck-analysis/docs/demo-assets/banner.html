<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  html, body { width: 1280px; height: 360px; margin: 0; overflow: hidden; }
  body {
    background:
      radial-gradient(700px 360px at 14% 30%, #15233d 0%, rgba(11,18,32,0) 70%),
      linear-gradient(120deg, #0b1220 0%, #0e1830 100%);
    color: #e6edf3;
    font: 400 24px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 72px; box-sizing: border-box;
  }
  .left .kicker {
    letter-spacing: 0.3em; text-transform: uppercase; color: #7ee2b8; font-size: 18px;
    font-weight: 600; margin-bottom: 16px;
  }
  .left h1 { font-size: 96px; font-weight: 800; margin: 0; letter-spacing: -0.02em; }
  .left .sub { font-size: 30px; color: #cdd9e5; margin-top: 12px; }
  .right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 18px; }
  .pill {
    display: inline-flex; align-items: center; gap: 10px; background: #10391f; color: #3fb950;
    font-weight: 700; font-size: 20px; padding: 8px 18px; border-radius: 999px;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: #3fb950; }
  .track { color: #9fb3c8; font-size: 22px; }
  .track b { color: #e6edf3; }
</style></head>
<body>
  <div class="left">
    <div class="kicker">Fighter safety, where teams already work</div>
    <h1>CornerCheck</h1>
    <div class="sub">Fighter-safety clearance, inside Slack</div>
  </div>
  <div class="right">
    <span class="pill"><span class="dot"></span> LIVE</span>
    <span class="track">Slack Agent Builder Challenge<br><b>Agent for Good</b></span>
  </div>
</body></html>
